<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Restormer DWT/IDWT Flowchart</title>
<style>
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding: 30px;
    margin: 0;
  }
  svg {
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }
  .box {
    rx: 8; ry: 8;
  }
  .encoder-box { fill: #0f3460; stroke: #5390d9; stroke-width: 2; }
  .decoder-box { fill: #3a0ca3; stroke: #7b2ff7; stroke-width: 2; }
  .down-box    { fill: #b5179e; stroke: #f72585; stroke-width: 2; }
  .up-box      { fill: #f77f00; stroke: #fcbf49; stroke-width: 2; }
  .latent-box  { fill: #d62828; stroke: #f77f00; stroke-width: 2; }
  .io-box      { fill: #264653; stroke: #2a9d8f; stroke-width: 2; }
  .refine-box  { fill: #1b4332; stroke: #40916c; stroke-width: 2; }

  .label {
    font-size: 14px; fill: #fff; text-anchor: middle;
    dominant-baseline: central; font-weight: 600;
  }
  .sublabel {
    font-size: 11px; fill: #ccc; text-anchor: middle;
    dominant-baseline: central;
  }
  .arrow { stroke: #aaa; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  .residual-arrow { stroke: #2a9d8f; stroke-width: 2; stroke-dasharray: 6,4; fill: none; marker-end: url(#arrowhead-green); }
  .legend-text { font-size: 12px; fill: #ccc; dominant-baseline: central; }
</style>
</head>
<body>
<svg width="920" height="860" viewBox="0 0 920 860">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a9d8f"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="30" class="label" font-size="20">Restormer U-Net (DWT↓ + 1×1 Conv / 1×1 Conv + IDWT↑)</text>
  <text x="460" y="52" class="sublabel" font-size="12">通道 2× 递增: C → 2C → 4C → 8C</text>

  <!-- ============ ENCODER SIDE (left) ============ -->
  <!-- Input -->
  <rect x="60" y="80" width="200" height="44" class="box io-box"/>
  <text x="160" y="96" class="label">Input Image</text>
  <text x="160" y="112" class="sublabel">(B, 3, H, W)</text>

  <!-- Patch Embed -->
  <rect x="60" y="148" width="200" height="44" class="box io-box"/>
  <text x="160" y="164" class="label">Patch Embed (3×3 Conv)</text>
  <text x="160" y="180" class="sublabel">(B, C, H, W)  C=48</text>
  <line x1="160" y1="124" x2="160" y2="148" class="arrow"/>

  <!-- Encoder Level 1 -->
  <rect x="60" y="216" width="200" height="50" class="box encoder-box"/>
  <text x="160" y="234" class="label">Encoder Level 1</text>
  <text x="160" y="250" class="sublabel">TransformerBlock × N₁  dim=C</text>
  <line x1="160" y1="192" x2="160" y2="216" class="arrow"/>

  <!-- DWT Down 1→2 -->
  <rect x="60" y="296" width="200" height="56" class="box down-box"/>
  <text x="160" y="310" class="label">DWT_Downsample</text>
  <text x="160" y="326" class="sublabel">DWT: C → 4C (H/2, W/2)</text>
  <text x="160" y="340" class="sublabel">1×1 Conv: 4C → 2C</text>
  <line x1="160" y1="266" x2="160" y2="296" class="arrow"/>

  <!-- Encoder Level 2 -->
  <rect x="60" y="382" width="200" height="50" class="box encoder-box"/>
  <text x="160" y="400" class="label">Encoder Level 2</text>
  <text x="160" y="416" class="sublabel">TransformerBlock × N₂  dim=2C</text>
  <line x1="160" y1="352" x2="160" y2="382" class="arrow"/>

  <!-- DWT Down 2→3 -->
  <rect x="60" y="462" width="200" height="56" class="box down-box"/>
  <text x="160" y="476" class="label">DWT_Downsample</text>
  <text x="160" y="492" class="sublabel">DWT: 2C → 8C (H/4, W/4)</text>
  <text x="160" y="506" class="sublabel">1×1 Conv: 8C → 4C</text>
  <line x1="160" y1="432" x2="160" y2="462" class="arrow"/>

  <!-- Encoder Level 3 -->
  <rect x="60" y="548" width="200" height="50" class="box encoder-box"/>
  <text x="160" y="566" class="label">Encoder Level 3</text>
  <text x="160" y="582" class="sublabel">TransformerBlock × N₃  dim=4C</text>
  <line x1="160" y1="518" x2="160" y2="548" class="arrow"/>

  <!-- DWT Down 3→4 -->
  <rect x="60" y="628" width="200" height="56" class="box down-box"/>
  <text x="160" y="642" class="label">DWT_Downsample</text>
  <text x="160" y="658" class="sublabel">DWT: 4C → 16C (H/8, W/8)</text>
  <text x="160" y="672" class="sublabel">1×1 Conv: 16C → 8C</text>
  <line x1="160" y1="598" x2="160" y2="628" class="arrow"/>

  <!-- Latent (bottom) -->
  <rect x="310" y="726" width="300" height="50" class="box latent-box"/>
  <text x="460" y="742" class="label">Latent (Bottleneck)</text>
  <text x="460" y="758" class="sublabel">TransformerBlock × N₄  dim=8C  (H/8, W/8)</text>
  <line x1="160" y1="684" x2="160" y2="706" class="arrow"/>
  <line x1="160" y1="706" x2="310" y2="751" class="arrow"/>

  <!-- ============ DECODER SIDE (right) ============ -->
  <!-- IDWT Up 4→3 -->
  <rect x="660" y="628" width="200" height="56" class="box up-box"/>
  <text x="760" y="642" class="label">IDWT_Upsample</text>
  <text x="760" y="658" class="sublabel">1×1 Conv: 8C → 16C</text>
  <text x="760" y="672" class="sublabel">IDWT: 16C → 4C (H/4, W/4)</text>
  <line x1="610" y1="751" x2="760" y2="684" class="arrow"/>

  <!-- Decoder Level 3 -->
  <rect x="660" y="548" width="200" height="50" class="box decoder-box"/>
  <text x="760" y="566" class="label">Decoder Level 3</text>
  <text x="760" y="582" class="sublabel">TransformerBlock × N₃  dim=4C</text>
  <line x1="760" y1="628" x2="760" y2="598" class="arrow"/>

  <!-- IDWT Up 3→2 -->
  <rect x="660" y="462" width="200" height="56" class="box up-box"/>
  <text x="760" y="476" class="label">IDWT_Upsample</text>
  <text x="760" y="492" class="sublabel">1×1 Conv: 4C → 8C</text>
  <text x="760" y="506" class="sublabel">IDWT: 8C → 2C (H/2, W/2)</text>
  <line x1="760" y1="548" x2="760" y2="518" class="arrow"/>

  <!-- Decoder Level 2 -->
  <rect x="660" y="382" width="200" height="50" class="box decoder-box"/>
  <text x="760" y="400" class="label">Decoder Level 2</text>
  <text x="760" y="416" class="sublabel">TransformerBlock × N₂  dim=2C</text>
  <line x1="760" y1="462" x2="760" y2="432" class="arrow"/>

  <!-- IDWT Up 2→1 -->
  <rect x="660" y="296" width="200" height="56" class="box up-box"/>
  <text x="760" y="310" class="label">IDWT_Upsample</text>
  <text x="760" y="326" class="sublabel">1×1 Conv: 2C → 4C</text>
  <text x="760" y="340" class="sublabel">IDWT: 4C → C (H, W)</text>
  <line x1="760" y1="382" x2="760" y2="352" class="arrow"/>

  <!-- Decoder Level 1 -->
  <rect x="660" y="216" width="200" height="50" class="box decoder-box"/>
  <text x="760" y="234" class="label">Decoder Level 1</text>
  <text x="760" y="250" class="sublabel">TransformerBlock × N₁  dim=C</text>
  <line x1="760" y1="296" x2="760" y2="266" class="arrow"/>

  <!-- Refinement -->
  <rect x="660" y="148" width="200" height="44" class="box refine-box"/>
  <text x="760" y="164" class="label">Refinement</text>
  <text x="760" y="180" class="sublabel">TransformerBlock × N_ref  dim=C</text>
  <line x1="760" y1="216" x2="760" y2="192" class="arrow"/>

  <!-- Output -->
  <rect x="660" y="80" width="200" height="44" class="box io-box"/>
  <text x="760" y="96" class="label">Output (3×3 Conv)</text>
  <text x="760" y="112" class="sublabel">(B, 3, H, W)</text>
  <line x1="760" y1="148" x2="760" y2="124" class="arrow"/>

  <!-- ============ GLOBAL RESIDUAL ============ -->
  <!-- Input → Output residual connection -->
  <path d="M 260 102 L 460 72 L 660 102" class="residual-arrow"/>
  <text x="460" y="64" class="sublabel" fill="#2a9d8f" font-size="10">+ Input (Global Residual)</text>

  <!-- ============ LEGEND ============ -->
  <rect x="30" y="800" width="860" height="50" rx="8" fill="#16213e" stroke="#334155" stroke-width="1"/>
  <text x="130" y="828" class="legend-text" text-anchor="middle" font-weight="600">Legend:</text>

  <rect x="180" y="821" width="24" height="14" fill="#0f3460" stroke="#5390d9" stroke-width="1.5" rx="3"/>
  <text x="212" y="828" class="legend-text">Encoder</text>

  <rect x="280" y="821" width="24" height="14" fill="#3a0ca3" stroke="#7b2ff7" stroke-width="1.5" rx="3"/>
  <text x="312" y="828" class="legend-text">Decoder</text>

  <rect x="380" y="821" width="24" height="14" fill="#b5179e" stroke="#f72585" stroke-width="1.5" rx="3"/>
  <text x="412" y="828" class="legend-text">DWT↓ + Conv</text>

  <rect x="500" y="821" width="24" height="14" fill="#f77f00" stroke="#fcbf49" stroke-width="1.5" rx="3"/>
  <text x="532" y="828" class="legend-text">Conv + IDWT↑</text>

  <rect x="630" y="821" width="24" height="14" fill="#1b4332" stroke="#40916c" stroke-width="1.5" rx="3"/>
  <text x="662" y="828" class="legend-text">Refinement</text>

  <line x1="740" y1="828" x2="780" y2="828" class="residual-arrow"/>
  <text x="790" y="828" class="legend-text">Residual</text>
</svg>
</body>
</html>
