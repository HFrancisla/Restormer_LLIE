# general settings
name: LLIM_Restormer_1gpu
model_type: ImageCleanModel
scale: 1
num_gpu: 1 # Changed from 8 to 1
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: LLIM_Train
    type: Dataset_PairedImage
    dataroot_gt: ./LLIM/Datasets/train/target
    dataroot_lq: ./LLIM/Datasets/train/input
    geometric_augs: true

    filename_tmpl: "{}"
    io_backend:
      type: disk

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 4 

    ### -------------Progressive training--------------------------
    mini_batch_sizes: [4, 4, 2, 1, 1, 1] 
    iters: [92000, 64000, 48000, 36000, 36000, 24000]
    gt_size: 384
    gt_sizes: [128, 160, 192, 256, 320, 384]
    ### ------------------------------------------------------------

    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: LLIM_Val
    type: Dataset_PairedImage
    dataroot_gt: ./LLIM/Datasets/test/target
    dataroot_lq: ./LLIM/Datasets/test/input
    io_backend:
      type: disk

# network structures
network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  dual_pixel_task: False
  use_checkpoint: True

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 300000
  warmup_iter: -1
  use_grad_clip: true

  # For 1 GPU to be equivalent to 8 GPUs:
  # Option 1: Linear Scaling (If not using gradient accumulation)
  # lr: 0.0000375 # 3e-4 / 8

  # Option 2: Gradient Accumulation (Recommended)
  # Maintain exact equivalent total batch size [64, 40, 32, 16, 8, 8]
  accumulation_steps: 16 # Exact steps for stage 1 (64/4)
  mini_accumulation_steps: [16, 10, 16, 16, 8, 8]

  optim_g:
    type: AdamW
    lr: !!float 3e-4 # Keep 3e-4 if using gradient accumulation
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [92000, 208000]
    restart_weights: [1, 1]
    eta_mins: [0.0003, 0.000001] # Keep original if using gradient accumulation

  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 8
  val_freq: !!float 4e3
  save_img: false
  rgb2bgr: true
  use_image: true
  max_minibatch: 8

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: !!float 4e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
